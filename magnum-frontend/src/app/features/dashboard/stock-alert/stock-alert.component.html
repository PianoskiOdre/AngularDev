<div *ngIf="stats" class="stock-alert-wrapper">

    <!-- CASO CRÍTICO: Estoque Zero/Baixo -->
    <div *ngIf="hasStockAlert" class="alert-box alert-critical">
        <div class="alert-icon-container">
            <!-- Ícone de Alerta (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="icon-alert">
                <path fill-rule="evenodd"
                    d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                    clip-rule="evenodd" />
            </svg>
        </div>
        <div class="alert-content">
            <p class="alert-title">
                Atenção: Estoque Baixo
            </p>
            <p class="alert-message">
                Existem <strong>{{ stats.lowStockAlerts.length }}</strong> produto(s) com quantidade zero.
                <!-- Usa routerLink para navegação SPA sem recarregar -->
                <a [routerLink]="['/produtos']" [queryParams]="{ filter: 'out-of-stock' }" class="alert-link">
                    Ver produtos
                </a>.
            </p>
        </div>
    </div>

    <!-- CASO SUCESSO: Tudo OK -->
    <div *ngIf="!hasStockAlert && stats" class="alert-box alert-success">
        <div class="alert-icon-container">
            <!-- Ícone de Sucesso (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="icon-success">
                <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
            </svg>
        </div>
        <div class="alert-content">
            <p class="alert-title">
                Estoque Saudável
            </p>
            <p class="alert-message">
                Todos os produtos possuem estoque disponível. Operação normal.
            </p>
        </div>
    </div>

</div>
