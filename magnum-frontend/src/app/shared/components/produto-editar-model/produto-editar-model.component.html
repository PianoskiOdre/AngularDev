<app-loading *ngIf="loading"></app-loading>
<div class="modal-overlay" *ngIf="isOpen" (click)="close()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Editar Produto</h2>
            <button class="btn-close" (click)="close()">X</button>
        </div>

        <div style="padding: 15px;">
            <!-- ALERT MESSAGE!-->
            <app-alert *ngIf="showAlert" [message]="alertMessage" [type]="alertType"></app-alert>

            <h3>Atualizar Produto</h3>

            <form [formGroup]="atualizarForm" (ngSubmit)="onSubmit()">

                <div style="margin-bottom: 10px;">
                    <label>Nome:</label>
                    <input type="text" formControlName="nome" name="nome"
                        [class.is-invalid]="atualizarForm.get('nome')?.invalid && atualizarForm.get('nome')?.touched"
                        required style="width: 100%; padding: 6px;">

                    <!-- Mensagens de erro para o campo 'nome' -->
                    <div *ngIf="atualizarForm.get('nome')?.invalid && atualizarForm.get('nome')?.touched" class="invalid-feedback d-block">
                        <small *ngIf="atualizarForm.get('nome')?.errors?.['required']">Nome é obrigatório.</small>
                        <small *ngIf="atualizarForm.get('nome')?.errors?.['pattern']">Nome deve conter apenas letras e espaços.</small>
                    </div>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Categoria:</label>
                    <select formControlName="categoria" name="categoria"
                        [class.is-invalid]="atualizarForm.get('categoria')?.invalid && atualizarForm.get('categoria')?.touched"
                        required style="width: 100%; padding: 6px;">
                        <option value="">Selecione</option>
                        <option value="Fixação">Fixação</option>
                        <option value="Portas, Janelas e Portões">Portas, Janelas e Portões</option>
                        <option value="Casa e Jardim">Casa e Jardim</option>
                        <option value="Ferramentas">Ferramentas</option>
                        <option value="Agrícolas">Agrícolas</option>
                        <option value="Hidráulica">Hidráulica</option>
                        <option value="Elétrica">Elétrica</option>
                        <option value="Ferragens">Ferragens</option>
                    </select>
                    <div *ngIf="atualizarForm.get('categoria')?.invalid && atualizarForm.get('categoria')?.touched"
                        class="invalid-feedback d-block">
                        <small *ngIf="atualizarForm.get('categoria')?.errors?.['required']">Categoria é
                            obrigatória.</small>
                        <small *ngIf="atualizarForm.get('categoria')?.errors?.['categoriaInvalida']">Selecione uma
                            categoria válida.</small>
                    </div>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Estoque:</label>
                    <input type="number" step="0" formControlName="estoque" name="estoque"
                        [class.is-invalid]="atualizarForm.get('estoque')?.invalid && atualizarForm.get('estoque')?.touched"
                        required min="0" style="width: 100%; padding: 6px;">
                    <div *ngIf="atualizarForm.get('estoque')?.invalid && atualizarForm.get('estoque')?.touched"
                        class="invalid-feedback d-block">
                        <small *ngIf="atualizarForm.get('estoque')?.errors?.['required']">Estoque é obrigatório.</small>
                    </div>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Preço Custo (R$):</label>
                    <input type="number" step="0.01" formControlName="precoCusto" (input)="onPrecoCustoChange()"
                        [class.is-invalid]="atualizarForm.get('precoCusto')?.invalid && atualizarForm.get('precoCusto')?.touched"
                        required min="0.01" style="width: 100%; padding: 6px;">
                    <div *ngIf="atualizarForm.get('precoCusto')?.invalid && atualizarForm.get('precoCusto')?.touched"
                        class="invalid-feedback d-block">
                        <small *ngIf="atualizarForm.get('precoCusto')?.errors?.['required']">Preço de custo é
                            obrigatório.</small>
                        <small *ngIf="atualizarForm.get('precoCusto')?.errors?.['min']">Preço deve ser maior que
                            zero.</small>
                    </div>
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Preço Venda (R$):</label>
                    <input type="number" step="0.01" formControlName="precoVenda"
                        [class.is-invalid]="atualizarForm.get('precoVenda')?.invalid && atualizarForm.get('precoVenda')?.touched"
                        required min="0.01" style="width: 100%; padding: 6px;">
                    <div *ngIf="atualizarForm.get('precoVenda')?.invalid && atualizarForm.get('precoVenda')?.touched"
                        class="invalid-feedback d-block">
                        <small *ngIf="atualizarForm.get('precoVenda')?.errors?.['required']">Preço de venda é
                            obrigatório.</small>
                        <small *ngIf="atualizarForm.get('precoVenda')?.errors?.['min']">Preço deve ser maior que
                            zero.</small>
                    </div>
                </div>
                <button type="submit" [disabled]="atualizarForm.invalid" class="btn-open-green">
                    Atualizar
                </button>
            </form>
        </div>
    </div>
</div>
